@if (isVisible) {
  <div
    class="gadget"
    [class.gadget--minimized]="isMinimized"
    [class.gadget--info-open]="isInfoVisible"
    [style.left.px]="position.x"
    [style.top.px]="position.y"
    (pointerdown)="onGadgetPointerDown($event)"
    (pointermove)="onGadgetPointerMove($event)"
    (pointerup)="onGadgetPointerUp($event)"
  >
    <div class="gadget-controls">
      <button class="gadget-btn" type="button" (click)="onMinimize(); $event.stopPropagation()" [title]="lang.gadget.minimize" [attr.aria-label]="lang.gadget.minimize">
        <svg class="gadget-btn-svg" viewBox="0 0 12 12" aria-hidden="true">
          <line x1="2" y1="9.5" x2="10" y2="9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
      <button
        class="gadget-btn gadget-btn--info"
        [class.gadget-btn--active]="isInfoVisible"
        type="button"
        (click)="onInfo(); $event.stopPropagation()"
        [title]="lang.gadget.info"
        [attr.aria-label]="lang.gadget.info"
        [attr.aria-expanded]="isInfoVisible"
      >
        <svg class="gadget-btn-svg" viewBox="0 0 12 12" aria-hidden="true">
          <circle cx="6" cy="6" r="4.6" fill="none" stroke="currentColor" stroke-width="1.1" />
          <circle cx="6" cy="3.8" r="0.65" fill="currentColor" />
          <rect x="5.55" y="5.2" width="0.9" height="3.4" rx="0.35" fill="currentColor" />
        </svg>
      </button>
      <button class="gadget-btn gadget-btn--close" type="button" (click)="onClose(); $event.stopPropagation()" [title]="lang.gadget.close" [attr.aria-label]="lang.gadget.close">
        <svg class="gadget-btn-svg" viewBox="0 0 12 12" aria-hidden="true">
          <line x1="2.5" y1="2.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" />
          <line x1="9.5" y1="2.5" x2="2.5" y2="9.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    @if (!isMinimized) {
      <div class="gadget-meter">
        <svg class="gadget-svg" viewBox="0 0 168 98" aria-hidden="true">
          <defs>
            <linearGradient id="chromeOuter" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="10%" stop-color="#f4f8fc" />
              <stop offset="28%" stop-color="#c8d4e0" />
              <stop offset="52%" stop-color="#98a8b8" />
              <stop offset="78%" stop-color="#708090" />
              <stop offset="100%" stop-color="#4a5662" />
            </linearGradient>

            <linearGradient id="chromeInner" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8eef4" />
              <stop offset="45%" stop-color="#9aaaba" />
              <stop offset="100%" stop-color="#5a6878" />
            </linearGradient>

            <linearGradient id="chromeShine" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.95)" />
              <stop offset="55%" stop-color="rgba(255,255,255,0.25)" />
              <stop offset="100%" stop-color="rgba(255,255,255,0)" />
            </linearGradient>

            <linearGradient id="chromeEdge" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.7)" />
              <stop offset="50%" stop-color="rgba(180,195,210,0.2)" />
              <stop offset="100%" stop-color="rgba(60,70,80,0.45)" />
            </linearGradient>

            <radialGradient id="dialFace" cx="38%" cy="32%" r="72%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="55%" stop-color="#fafbfc" />
              <stop offset="100%" stop-color="#e4e9ef" />
            </radialGradient>

            <radialGradient id="dialGlass" cx="35%" cy="25%" r="55%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.55)" />
              <stop offset="100%" stop-color="rgba(255,255,255,0)" />
            </radialGradient>

            <linearGradient id="needleGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ff6868" />
              <stop offset="100%" stop-color="#b81818" />
            </linearGradient>

            <linearGradient id="lcdBezel" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#484848" />
              <stop offset="100%" stop-color="#0c0c0c" />
            </linearGradient>

            <filter id="gaugeShadow" x="-35%" y="-35%" width="170%" height="170%">
              <feDropShadow dx="0" dy="2.5" stdDeviation="2.8" flood-color="rgba(0,0,0,0.45)" />
            </filter>

            <filter id="chromeGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="0.5" stdDeviation="0.4" flood-color="rgba(255,255,255,0.6)" />
            </filter>

            <clipPath id="faceClipL"><circle r="38.5" /></clipPath>
            <clipPath id="faceClipS"><circle r="27" /></clipPath>
            <clipPath id="ringClipL"><circle r="43.5" /></clipPath>
            <clipPath id="ringClipS"><circle r="30.5" /></clipPath>
          </defs>

          <!-- Medidor pequeño (atrás, derecha) - Tecnologías -->
          <g transform="translate(108, 38)" filter="url(#gaugeShadow)">
            <circle r="31.5" fill="rgba(0,0,0,0.22)" transform="translate(0, 1.5)" />
            <circle r="31" fill="url(#chromeOuter)" stroke="url(#chromeEdge)" stroke-width="0.6" filter="url(#chromeGlow)" />
            <circle r="28.8" fill="none" stroke="url(#chromeInner)" stroke-width="1.8" />
            <g clip-path="url(#ringClipS)">
              <ellipse cx="-8" cy="-24" rx="18" ry="7" fill="url(#chromeShine)" opacity="0.85" />
            </g>
            <circle r="27.5" fill="url(#dialFace)" stroke="rgba(90,105,120,0.45)" stroke-width="0.55" />
            <g clip-path="url(#faceClipS)">
              @for (zone of smallZones; track zone.start) {
                <path
                  [attr.d]="arcWedgePath(zone.start, zone.end, 19, 27)"
                  [attr.fill]="zone.color"
                  [attr.opacity]="zone.opacity"
                />
              }
              <circle r="27" fill="url(#dialGlass)" />
            </g>
            <g class="gauge-ticks">
              @for (tick of smallTicks; track tick.angle) {
                <line
                  [attr.x1]="tickInner(tick.angle, 22)"
                  [attr.y1]="tickInnerY(tick.angle, 22)"
                  [attr.x2]="tickOuter(tick.angle, 26)"
                  [attr.y2]="tickOuterY(tick.angle, 26)"
                  [attr.stroke]="tick.color"
                  [attr.stroke-width]="tick.width"
                  stroke-linecap="round"
                />
              }
            </g>
            <!-- Etiqueta + tablero LCD -->
            <text class="gauge-label gauge-label--small" x="0" y="9.2" text-anchor="middle" font-size="4.8">{{ lang.gadget.techLabel }}</text>
            <rect x="-12" y="10.5" width="24" height="10" rx="0.7" fill="url(#lcdBezel)" stroke="#555" stroke-width="0.5" />
            <rect x="-10.5" y="11.8" width="21" height="7.4" rx="0.5" fill="#0a0a0a" />
            <text x="0" y="17.6" text-anchor="middle" fill="#6dff6d" font-size="9" font-weight="700" font-family="Consolas, Courier New, monospace">{{ technologies }}</text>
            <!-- Aguja -->
            <g [attr.transform]="'rotate(' + techNeedleAngle + ')'">
              <polygon points="0,-21 2.2,0 0,3 -2.2,0" fill="url(#needleGrad)" stroke="#8a1010" stroke-width="0.35" />
            </g>
            <circle r="3.2" fill="#2a2a2a" stroke="#666" stroke-width="0.5" />
            <circle r="1.2" fill="#555" />
          </g>

          <!-- Medidor grande (delante, izquierda) - Proyectos -->
          <g transform="translate(58, 52)" filter="url(#gaugeShadow)">
            <circle r="44.5" fill="rgba(0,0,0,0.22)" transform="translate(0, 1.8)" />
            <circle r="44" fill="url(#chromeOuter)" stroke="url(#chromeEdge)" stroke-width="0.7" filter="url(#chromeGlow)" />
            <circle r="41.2" fill="none" stroke="url(#chromeInner)" stroke-width="2.2" />
            <g clip-path="url(#ringClipL)">
              <ellipse cx="-12" cy="-34" rx="26" ry="9" fill="url(#chromeShine)" opacity="0.9" />
              <ellipse cx="10" cy="36" rx="14" ry="4" fill="rgba(255,255,255,0.12)" />
            </g>
            <circle r="39" fill="url(#dialFace)" stroke="rgba(90,105,120,0.45)" stroke-width="0.65" />
            <g clip-path="url(#faceClipL)">
              @for (zone of largeZones; track zone.start) {
                <path
                  [attr.d]="arcWedgePath(zone.start, zone.end, 28, 37)"
                  [attr.fill]="zone.color"
                  [attr.opacity]="zone.opacity"
                />
              }
              <circle r="38.5" fill="url(#dialGlass)" />
            </g>
            <g class="gauge-ticks">
              @for (tick of largeTicks; track tick.angle) {
                <line
                  [attr.x1]="tickInner(tick.angle, 31)"
                  [attr.y1]="tickInnerY(tick.angle, 31)"
                  [attr.x2]="tickOuter(tick.angle, 36)"
                  [attr.y2]="tickOuterY(tick.angle, 36)"
                  [attr.stroke]="tick.color"
                  [attr.stroke-width]="tick.width"
                  stroke-linecap="round"
                />
              }
            </g>
            <!-- Etiqueta + tablero LCD -->
            <text class="gauge-label gauge-label--large" x="0" y="14.5" text-anchor="middle" font-size="7.5">{{ lang.gadget.projectsLabel }}</text>
            <rect x="-13" y="18.5" width="26" height="10.5" rx="0.7" fill="url(#lcdBezel)" stroke="#555" stroke-width="0.5" />
            <rect x="-11.5" y="19.8" width="23" height="8" rx="0.5" fill="#0a0a0a" />
            <text x="0" y="26.2" text-anchor="middle" fill="#6dff6d" font-size="9.5" font-weight="700" font-family="Consolas, Courier New, monospace">{{ projects }}</text>
            <!-- Aguja -->
            <g [attr.transform]="'rotate(' + projectNeedleAngle + ')'">
              <polygon points="0,-30 3,0 0,4 -3,0" fill="url(#needleGrad)" stroke="#8a1010" stroke-width="0.4" />
            </g>
            <circle r="4.2" fill="#2a2a2a" stroke="#666" stroke-width="0.55" />
            <circle r="1.5" fill="#555" />
          </g>
        </svg>
      </div>

      <div class="gadget-caption">
        <div class="gadget-caption-role">{{ lang.gadget.role }}</div>
      </div>
    }
  </div>
}

@if (isVisible && isInfoVisible) {
  <app-modal
    [titulo]="lang.gadget.profileSummaryTitle"
    [mensaje]="infoModalMessage"
    [mostrarCancelar]="false"
    (onAceptar)="closeInfoModal()"
    (onCancelar)="closeInfoModal()"
  ></app-modal>
}
