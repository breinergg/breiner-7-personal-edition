<div class="word-app">
  <div class="word-ribbon">
    <span class="word-ribbon-tab word-ribbon-tab--active">{{ lang.shared.wordHome }}</span>
    <span class="word-ribbon-tab">{{ lang.shared.wordInsert }}</span>
    <span class="word-ribbon-tab">{{ lang.shared.wordPageDesign }}</span>
  </div>

  <div class="word-workspace">
    <article class="word-page">
      <h1 class="word-title">{{ lang.apps.miHistoria.title }}</h1>

      @for (paragraph of lang.apps.miHistoria.paragraphs; track $index) {
        <p>{{ paragraph }}</p>
      }

      <p class="word-signature">
        {{ lang.apps.miHistoria.signatureLine }}<br />
        <strong>Breiner Gonzalez Machado</strong>
      </p>
    </article>
  </div>
</div>
