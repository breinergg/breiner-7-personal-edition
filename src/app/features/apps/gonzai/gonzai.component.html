<div class="word-app">
  <div class="word-ribbon">
    <span class="word-ribbon-tab word-ribbon-tab--active">{{ lang.shared.wordHome }}</span>
    <span class="word-ribbon-tab">{{ lang.shared.wordInsert }}</span>
    <span class="word-ribbon-tab">{{ lang.shared.wordPageDesign }}</span>
  </div>

  <div class="word-workspace">
    <article class="word-page">
      <div [innerHTML]="documentHtml"></div>

      <section class="word-carousel" [attr.aria-label]="lang.apps.wordCarousel.carouselAria.gonzai">
        <div class="word-carousel-frame">
          <button
            type="button"
            class="word-carousel-nav word-carousel-nav--prev"
            [attr.aria-label]="lang.apps.wordCarousel.prevImage"
            (click)="prevSlide()"
          >
            &#8249;
          </button>

          <figure class="word-carousel-slide">
            <div class="word-carousel-media">
              <button
                type="button"
                class="word-carousel-zoom"
                [attr.aria-label]="lang.apps.wordCarousel.enlarge"
                [title]="lang.apps.wordCarousel.enlarge"
                (click)="openZoom()"
              >
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                  <path d="M14.5 14.5 L20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M10 7.2 V12.8 M7.2 10 H12.8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </button>
              <button
                type="button"
                class="word-carousel-image-btn"
                [attr.aria-label]="lang.apps.wordCarousel.viewEnlarged"
                (click)="openZoom()"
              >
                <img
                  [src]="demoSlides[activeSlide].src"
                  [alt]="demoSlides[activeSlide].alt"
                  class="word-carousel-image"
                />
              </button>
            </div>
            <figcaption class="word-carousel-caption">
              {{ demoSlides[activeSlide].caption }}
            </figcaption>
          </figure>

          <button
            type="button"
            class="word-carousel-nav word-carousel-nav--next"
            [attr.aria-label]="lang.apps.wordCarousel.nextImage"
            (click)="nextSlide()"
          >
            &#8250;
          </button>
        </div>

        <div class="word-carousel-dots" role="tablist" [attr.aria-label]="lang.apps.wordCarousel.selectCapture">
          @for (slide of demoSlides; track slide.src; let i = $index) {
            <button
              type="button"
              class="word-carousel-dot"
              [class.word-carousel-dot--active]="activeSlide === i"
              [attr.aria-selected]="activeSlide === i"
              [attr.aria-label]="captureLabel(i)"
              (click)="goToSlide(i)"
            ></button>
          }
        </div>

        <p class="word-carousel-counter">
          {{ activeSlide + 1 }} / {{ demoSlides.length }}
        </p>
      </section>
    </article>
  </div>

  @if (zoomOpen) {
    <div class="word-zoom-overlay" role="dialog" aria-modal="true" [attr.aria-label]="lang.apps.wordCarousel.viewEnlarged">
      <div class="word-zoom-window">
        <div class="word-zoom-titlebar">
          <span class="word-zoom-title">{{ enlargedViewLabel() }}</span>
          <button
            type="button"
            class="word-zoom-restore"
            [attr.aria-label]="lang.apps.wordCarousel.restoreSize"
            [title]="lang.apps.wordCarousel.restore"
            (click)="closeZoom()"
          >
            <span class="word-zoom-restore-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="word-zoom-body">
          <img
            [src]="demoSlides[activeSlide].src"
            [alt]="demoSlides[activeSlide].alt"
            class="word-zoom-image"
          />
          <p class="word-zoom-caption">{{ demoSlides[activeSlide].caption }}</p>
        </div>
      </div>
    </div>
  }
</div>
